<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>IK Solver 収束速度比較</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
      min-height: 100vh;
    }
    h1 { font-size: 18px; margin-bottom: 16px; color: #fff; }
    h2 { font-size: 12px; font-weight: bold; color: #aaa; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
    .layout { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 16px;
    }
    .controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .row { display: flex; align-items: center; gap: 8px; }
    .row label { width: 130px; font-size: 11px; color: #bbb; }
    input[type=range] { width: 120px; accent-color: #4fc3f7; }
    .val { font-size: 11px; width: 36px; text-align: right; color: #fff; }
    canvas { display: block; border-radius: 4px; }
    .legend { display: flex; gap: 14px; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #ccc; }
    .swatch { width: 14px; height: 14px; border-radius: 3px; }
    table { border-collapse: collapse; width: 100%; font-size: 11px; margin-top: 12px; }
    th { color: #aaa; border-bottom: 1px solid rgba(255,255,255,0.15); padding: 4px 8px; text-align: right; font-weight: normal; }
    th:first-child { text-align: left; }
    td { padding: 4px 8px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.06); }
    td:first-child { text-align: left; color: #bbb; }
    .conv { color: #4caf50; }
    .divg { color: #ef5350; }
    hr { border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 12px 0; }
  </style>
</head>
<body>
<h1>IK Solver 収束速度比較</h1>
<div class="layout">

  <!-- Left: controls + chain viz -->
  <div class="panel" style="width:280px;">
    <h2>パラメータ</h2>
    <div class="controls">
      <div class="row"><label>リンク1 長さ</label><input type="range" id="l1" min="40" max="150" value="100"><span class="val" id="l1v">100</span></div>
      <div class="row"><label>リンク2 長さ</label><input type="range" id="l2" min="40" max="150" value="80"><span class="val" id="l2v">80</span></div>
      <div class="row"><label>目標半径</label><input type="range" id="r" min="30" max="220" value="130"><span class="val" id="rv">130</span></div>
      <div class="row"><label>DLS λ</label><input type="range" id="lam" min="1" max="100" value="50"><span class="val" id="lamv">50</span></div>
      <div class="row"><label>最大反復回数</label><input type="range" id="mi" min="10" max="500" value="100"><span class="val" id="miv">100</span></div>
      <div class="row"><label>サンプル数</label><input type="range" id="ns" min="8" max="100" step="4" value="36"><span class="val" id="nsv">36</span></div>
    </div>

    <hr>
    <h2>チェーン可視化（選択目標）</h2>
    <canvas id="chainCanvas" width="248" height="248" style="background:#0f0f23; border-radius:4px;"></canvas>
    <div style="font-size:10px; color:#888; margin-top:6px;">
      グラフ上の点をクリックして目標を選択
    </div>

    <hr>
    <h2>統計サマリ</h2>
    <table id="summaryTable">
      <thead><tr><th>手法</th><th>平均</th><th>中央値</th><th>最大</th><th>収束率</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Right: iteration graph -->
  <div class="panel" style="flex:1; min-width:420px;">
    <h2>反復回数 vs 目標角度</h2>
    <div class="legend">
      <div class="legend-item"><div class="swatch" style="background:#4fc3f7"></div>疑似逆行列</div>
      <div class="legend-item"><div class="swatch" style="background:#81c784"></div>Jacobian転置</div>
      <div class="legend-item"><div class="swatch" style="background:#ffb74d"></div>DLS</div>
      <div class="legend-item"><div class="swatch" style="background:#555; border:1px dashed #888"></div>非収束</div>
    </div>
    <canvas id="graphCanvas" width="600" height="380" style="background:#0f0f23; border-radius:4px; cursor:crosshair; max-width:100%;"></canvas>
    <div style="font-size:10px; color:#888; margin-top:6px; text-align:center;">
      ▲ 非収束の場合は最大反復回数に達したことを示す
    </div>
  </div>

</div>

<script src="ik-bundle.js"></script>
<script>

// ============================================================
//  State & Experiment
// ============================================================

const BASE_ANGLE = Math.PI / 2; // pointing up
const INIT_ANGLES = [0.3, -0.3]; // slightly bent
const COLORS = { pseudo: '#4fc3f7', transpose: '#81c784', damped: '#ffb74d' };

let params = { l1: 100, l2: 80, radius: 130, lambda: 50, maxIters: 100, nSamples: 36 };
let experimentData = [];
let selectedIdx = 0;

function getTargets() {
  return Array.from({ length: params.nSamples }, (_, i) => {
    const a = (i / params.nSamples) * 2 * Math.PI;
    return { x: Math.cos(a) * params.radius, y: Math.sin(a) * params.radius };
  });
}

function runExperiment() {
  const targets = getTargets();
  const lengths = [params.l1, params.l2];
  experimentData = targets.map((target, i) => {
    const pseudo    = solvePseudoinverse(BASE_ANGLE, lengths, INIT_ANGLES, target, params.maxIters);
    const transpose = solveTranspose(BASE_ANGLE, lengths, INIT_ANGLES, target, params.maxIters);
    const damped    = solveDamped(BASE_ANGLE, lengths, INIT_ANGLES, target, params.lambda, params.maxIters);
    return { angle: (i / params.nSamples) * 360, target, pseudo, transpose, damped };
  });
}

// ============================================================
//  Drawing
// ============================================================

function drawGraph() {
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const PAD = { top: 20, right: 20, bottom: 40, left: 50 };
  const gW = W - PAD.left - PAD.right;
  const gH = H - PAD.top - PAD.bottom;

  ctx.clearRect(0, 0, W, H);

  if (!experimentData.length) return;

  const maxY = params.maxIters;
  const n = experimentData.length;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  const ySteps = 5;
  for (let i = 0; i <= ySteps; i++) {
    const y = PAD.top + gH - (i / ySteps) * gH;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + gW, y); ctx.stroke();
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round((i / ySteps) * maxY), PAD.left - 6, y + 3);
  }

  // X axis labels
  ctx.textAlign = 'center';
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  const xStep = Math.ceil(n / 6);
  for (let i = 0; i < n; i += xStep) {
    const x = PAD.left + (i / (n - 1)) * gW;
    ctx.fillText(Math.round(experimentData[i].angle) + '°', x, H - PAD.bottom + 14);
  }

  // Axis labels
  ctx.save();
  ctx.translate(12, PAD.top + gH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('反復回数', 0, 0);
  ctx.restore();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaa';
  ctx.fillText('目標角度', PAD.left + gW / 2, H - 4);

  // Draw lines
  function drawLine(key, color) {
    // Non-converged points: draw as dots with dashed top
    const conv = [], divg = [];
    experimentData.forEach((d, i) => {
      const x = PAD.left + (i / (n - 1)) * gW;
      const y = PAD.top + gH - (d[key].iters / maxY) * gH;
      (d[key].converged ? conv : divg).push({ x, y, i });
    });

    // Dashed line for diverged
    divg.forEach(({ x, y }) => {
      ctx.save();
      ctx.setLineDash([3, 3]);
      ctx.strokeStyle = 'rgba(100,100,100,0.6)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, y); ctx.stroke();
      ctx.restore();
    });

    // Solid line
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    let first = true;
    experimentData.forEach((d, i) => {
      const x = PAD.left + (i / (n - 1)) * gW;
      const y = PAD.top + gH - (d[key].iters / maxY) * gH;
      if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Dots
    experimentData.forEach((d, i) => {
      const x = PAD.left + (i / (n - 1)) * gW;
      const y = PAD.top + gH - (d[key].iters / maxY) * gH;
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fillStyle = d[key].converged ? color : '#555';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }

  drawLine('damped', COLORS.damped);
  drawLine('transpose', COLORS.transpose);
  drawLine('pseudo', COLORS.pseudo);

  // Selected marker
  const sd = experimentData[selectedIdx];
  const sx = PAD.left + (selectedIdx / (n - 1)) * gW;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(sx, PAD.top); ctx.lineTo(sx, PAD.top + gH); ctx.stroke();
  ctx.setLineDash([]);
}

function drawChain() {
  const canvas = document.getElementById('chainCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const CX = W / 2, CY = H / 2;
  const maxLen = params.l1 + params.l2;
  const scale = (Math.min(W, H) / 2 - 16) / (maxLen || 1);

  ctx.clearRect(0, 0, W, H);

  // Reachability circle
  ctx.beginPath();
  ctx.arc(CX, CY, maxLen * scale, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Target circle
  const tgtRadius = params.radius * scale;
  ctx.beginPath();
  ctx.arc(CX, CY, tgtRadius, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  if (!experimentData.length) return;

  const d = experimentData[selectedIdx];
  const target = d.target;
  const lengths = [params.l1, params.l2];

  function drawArm(angles, color, alpha) {
    const pos = computeFK(BASE_ANGLE, lengths, angles);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    pos.forEach((p, i) => {
      const sx = CX + p.x * scale;
      const sy = CY - p.y * scale;
      i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    });
    ctx.stroke();
    // Joints
    pos.forEach((p, i) => {
      ctx.beginPath();
      ctx.arc(CX + p.x * scale, CY - p.y * scale, i === 0 ? 5 : 3, 0, Math.PI * 2);
      ctx.fillStyle = i === 0 ? '#fff' : color;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // Initial pose (faded)
  drawArm(INIT_ANGLES, '#555', 0.5);

  // Solved poses
  drawArm(d.damped.angles, COLORS.damped, 0.85);
  drawArm(d.transpose.angles, COLORS.transpose, 0.85);
  drawArm(d.pseudo.angles, COLORS.pseudo, 0.85);

  // Target
  const tx = CX + target.x * scale, ty = CY - target.y * scale;
  ctx.beginPath();
  ctx.arc(tx, ty, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(tx, ty, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#e53935';
  ctx.fill();

  // Legend
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  [
    [COLORS.pseudo,    `疑似逆行列 (${d.pseudo.iters}回${d.pseudo.converged ? '' : ' ✗'})`],
    [COLORS.transpose, `転置 (${d.transpose.iters}回${d.transpose.converged ? '' : ' ✗'})`],
    [COLORS.damped,    `DLS (${d.damped.iters}回${d.damped.converged ? '' : ' ✗'})`],
  ].forEach(([c, label], i) => {
    ctx.fillStyle = c;
    ctx.fillRect(6, 6 + i * 14, 10, 10);
    ctx.fillStyle = '#ddd';
    ctx.fillText(label, 20, 15 + i * 14);
  });
}

function updateSummaryTable() {
  if (!experimentData.length) return;
  const tbody = document.querySelector('#summaryTable tbody');
  tbody.innerHTML = '';

  const methods = [
    { key: 'pseudo',    label: '疑似逆行列', color: COLORS.pseudo },
    { key: 'transpose', label: 'Jacobian転置', color: COLORS.transpose },
    { key: 'damped',    label: 'DLS',          color: COLORS.damped },
  ];

  methods.forEach(({ key, label, color }) => {
    const data = experimentData.map(d => d[key]);
    const iters = data.map(d => d.iters);
    const convCount = data.filter(d => d.converged).length;
    const convRate = (convCount / data.length * 100).toFixed(0);
    const sorted = [...iters].sort((a, b) => a - b);
    const mean = (iters.reduce((s, x) => s + x, 0) / iters.length).toFixed(1);
    const median = sorted[Math.floor(sorted.length / 2)];
    const max = sorted[sorted.length - 1];

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:${color}">${label}</td>
      <td>${mean}</td>
      <td>${median}</td>
      <td>${max}</td>
      <td class="${convRate == 100 ? 'conv' : 'divg'}">${convRate}%</td>
    `;
    tbody.appendChild(tr);
  });
}

function refresh() {
  runExperiment();
  drawGraph();
  drawChain();
  updateSummaryTable();
}

// ============================================================
//  Controls
// ============================================================

function bindSlider(id, key, valId) {
  const input = document.getElementById(id);
  const span = document.getElementById(valId);
  input.addEventListener('input', () => {
    params[key] = +input.value;
    span.textContent = input.value;
    refresh();
  });
}

bindSlider('l1',  'l1',       'l1v');
bindSlider('l2',  'l2',       'l2v');
bindSlider('r',   'radius',   'rv');
bindSlider('lam', 'lambda',   'lamv');
bindSlider('mi',  'maxIters', 'miv');
bindSlider('ns',  'nSamples', 'nsv');

// Click on graph to select target
document.getElementById('graphCanvas').addEventListener('click', (e) => {
  const canvas = e.currentTarget;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const PAD_LEFT = 50;
  const gW = canvas.width - PAD_LEFT - 20;
  const frac = Math.max(0, Math.min(1, (x - PAD_LEFT) / gW));
  selectedIdx = Math.round(frac * (experimentData.length - 1));
  drawGraph();
  drawChain();
});


// ============================================================
//  Init
// ============================================================
refresh();
</script>
</body>
</html>
